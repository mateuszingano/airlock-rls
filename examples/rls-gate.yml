# Example workflow — drop this in your repo at .github/workflows/rls-gate.yml
#
# It runs the Airlock gate on every push and pull request. If a table ships
# without RLS, or a policy is permissive (USING (true)), the job fails and the
# merge is blocked.
#
# Setup (once):
#   1. Add your Supabase Postgres connection string as a repo secret named
#      SUPABASE_DB_URL  (Settings → Secrets and variables → Actions).
#      Use a read-only / least-privilege role — the audit only needs to read
#      pg_tables and pg_policies.
#   2. Replace mateuszingano/airlock-rls@v1 with the published action reference.

name: RLS Gate

on:
  push:
  pull_request:

jobs:
  rls-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Airlock — RLS CI Gate
        # @v1 is a moving tag: whoever controls it can change what runs in your
        # CI, which already holds your database URL. Pin the commit SHA and let
        # Dependabot bump it. Swap this for the SHA of the release you audited.
        uses: mateuszingano/airlock-rls@v1
        with:
          db-url: ${{ secrets.SUPABASE_DB_URL }}
          # Optional — policies that are permissive on purpose. Prefer the
          # qualified "table.policy" form; a bare name is only applied when
          # exactly one table carries it.
          # allow: status_page.public_read,orders.status_select
          # schema: public
          # Several rules only warn. This makes them break the build:
          # fail-on: warn
