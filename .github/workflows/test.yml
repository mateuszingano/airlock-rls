name: test

on:
  push:
  pull_request:

jobs:
  # Unit tests — pure classifier, no database. The integration test file is
  # gated by AIRLOCK_TEST_DB_URL and skips here, so this job stays offline.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test

  # Integration — runs the REAL audit() against a real Postgres service
  # container. Loads the fixtures (test/fixtures/*.sql) and asserts that a leaky
  # schema fails and a clean one passes, end-to-end through the SQL in audit().
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AIRLOCK_TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      # Only the integration file; it connects to the service container above.
      # A SKIP is not a PASS: if the DB never came up (or the env was dropped),
      # the file's gate makes every test skip and `node --test` still exits 0 —
      # the job would go green having verified nothing, which is exactly the
      # false-confidence this job exists to prevent. So fail on any skip, and
      # fail if zero tests ran. pipefail preserves a real test failure too.
      - name: Integration tests (must actually run, never skip)
        shell: bash
        run: |
          set -eo pipefail
          # --test-reporter=tap pins the summary format (`# pass N` / `# skipped N`)
          # so the checks below don't depend on the default reporter.
          node --test --test-reporter=tap test/integration.test.mjs 2>&1 | tee integration-out.txt
          if grep -qE '^# skipped [1-9]' integration-out.txt; then
            echo "::error::Integration tests SKIPPED — the Postgres service was unreachable. A green skip is not a pass."
            exit 1
          fi
          if ! grep -qE '^# pass [1-9]' integration-out.txt; then
            echo "::error::No integration tests ran."
            exit 1
          fi
