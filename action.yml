name: 'Airlock RLS — CI Gate for Supabase'
description: 'Fails the build when a table ships without RLS or a policy is permissive (USING (true)). The gate scanners do not have.'
author: 'ZINGUI'

# Marketplace branding — GitHub only allows a fixed icon set + color palette.
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  db-url:
    description: 'Postgres connection string for the Supabase project to audit. Store it as a repo secret and pass it here.'
    required: true
  allow:
    description: 'Comma-separated policy names that are intentionally permissive (e.g. a public status page). These will not fail the gate.'
    required: false
    default: ''
  schema:
    description: 'Schema to audit. A schema with nothing in it now FAILS the gate instead of passing green — an empty or misspelled schema is not proof that your RLS is correct.'
    required: false
    default: 'public'
  fail-on:
    description: 'What breaks the build: "fail" (default) or "warn". Most rules emit warn (including an authenticated tenant leak); with "fail" they are printed but cannot gate.'
    required: false
    default: 'fail'
  site:
    description: 'Deployed site URL to scan for an exposed service_role key (bypasses all RLS). Optional; needs no database.'
    required: false
    default: ''
  url:
    description: 'Supabase project URL. With anon-key, enables the DAST pass that PROVES exposure by actually reading each table with the anon key.'
    required: false
    default: ''
  anon-key:
    description: 'Public anon key for the DAST pass (public by design — safe to pass). Only used together with url.'
    required: false
    default: ''
  dast-write:
    description: 'Also probe anonymous INSERTs during the DAST pass (safe — leaves no test data). Set to "true" to enable.'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version used to run the audit.'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install audit dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --no-audit --no-fund

    # Every input goes through env. `${{ }}` is substituted textually BEFORE bash
    # parses the line, so quotes do NOT protect an input interpolated inline in
    # `run:` — a caller wiring `schema:` to issue-body or matrix data would get
    # command execution on their runner, which holds SUPABASE_DB_URL.
    # DAST_WRITE_FLAG is a literal picked by the ternary (never caller text), so
    # leaving it unquoted is safe and lets the empty case expand to no argument.
    - name: Run RLS audit (the gate)
      shell: bash
      run: >
        node "$GITHUB_ACTION_PATH/bin/airlock.mjs"
        --schema "$INPUT_SCHEMA"
        $DAST_WRITE_FLAG
      env:
        INPUT_SCHEMA: ${{ inputs.schema }}
        RLS_AUDIT_FAIL_ON: ${{ inputs.fail-on }}
        DAST_WRITE_FLAG: ${{ inputs.dast-write == 'true' && '--dast-write' || '' }}
        SUPABASE_DB_URL: ${{ inputs.db-url }}
        RLS_AUDIT_ALLOW: ${{ inputs.allow }}
        SUPABASE_SITE_URL: ${{ inputs.site }}
        SUPABASE_URL: ${{ inputs.url }}
        SUPABASE_ANON_KEY: ${{ inputs.anon-key }}
